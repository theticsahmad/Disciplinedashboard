<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script>
        let water = 0;

function addWater() {
  water += 1;
  document.getElementById("waterText").innerText = water + "L";
}

function resetWater() {
  water = 0;
  document.getElementById("waterText").innerText = water + "L";
}
    </script>
    <title>Discipline Dashboard</title>
</head>
<body>
    <navbar>

        <ul class="nav">
            <li><a class="active" href="#home">Home</a></li>
            <li><a href="#progress">Progress</a></li>
            <li><a href="#habits">Habits</a></li>
            <li><a href="#goals">Goals</a></li>
        </ul>
    </navbar>
    
              
    <section class="hero" id="hero">
   <div class="cont1">
     <img id="laid" src="da.png" alt="">
    <div class="topl"><h1 >BUILT BY DISCIPLINE,
    NOT MOTIVATION.</h1></div>
    <p class="ty" style="color: crimson;">Built for your progress and personal tracking
        <br> to help you be your best self. <br>
        <br> <span class="hungry">Stay Hungry, Stay Blessed.</span>
    </p>
    </div>
    </section>
    <hr style="color: azure; size: 200vh; position: absolute;top: 100vh;">

        <div class="card">
  <h3>Water</h3>
  <p id="waterText">0L</p>

  <button onclick="addWater()">+1L</button>
  <button onclick="resetWater()">Reset</button>
    </div>

    </section>
</body>
</html>
